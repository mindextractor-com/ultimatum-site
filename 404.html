<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<link rel="icon" type="image/jpeg" href="/images/cover-better-eng.jpg">
<title>404 — Ultimatum</title>
<meta name="description" content="Page not found. Head back to the Ultimatum book landing page.">
<meta name="robots" content="noindex,follow">
<style>
@font-face{font-family:'Albertus Nova';src:url('/fonts/albertus-nova-black.woff2')format('woff2');font-weight:900;font-style:normal;font-display:swap}
@font-face{font-family:'Jost';src:url('/fonts/jost-variable.woff2')format('woff2');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'Ubuntu Mono';src:url('/fonts/ubuntu-mono-regular.woff2')format('woff2');font-weight:400;font-style:normal;font-display:swap}
:root{
  --font-display:'Albertus Nova',Georgia,serif;
  --font-text:'Jost',system-ui,sans-serif;
  --font-mono:'Ubuntu Mono','Courier New',monospace;
  --d-bg:#0E0F15;--d-text:#E5E6E9;--d-muted:rgba(229,230,233,.5);--d-border:rgba(229,230,233,.08);
  --acc:#FF2A38;--acc-glow:rgba(255,42,56,.45);
  --px:clamp(1.25rem,5vw,4rem);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--d-bg);color:var(--d-text);
  font-family:var(--font-text);line-height:1.6;
  min-height:100dvh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
  padding:var(--px);gap:.25rem;
}
.code{
  font-family:var(--font-display);font-weight:900;
  font-size:clamp(5rem,22vw,13rem);line-height:.9;letter-spacing:-.02em;
  color:var(--acc);text-shadow:0 0 60px var(--acc-glow);
}
.eyebrow{font-family:var(--font-mono);font-size:.625rem;letter-spacing:.3em;text-transform:uppercase;color:var(--d-muted);margin-bottom:1.5rem}
h1{font-family:var(--font-display);font-weight:900;font-size:clamp(1.25rem,3.5vw,2rem);margin:1.25rem 0 .5rem}
p{color:var(--d-muted);max-width:38ch;margin-bottom:2rem}
.home{
  display:inline-block;font-family:var(--font-mono);font-size:.75rem;
  letter-spacing:.18em;text-transform:uppercase;text-decoration:none;
  color:var(--d-text);border:1px solid var(--d-border);
  padding:.7rem 1.4rem;border-radius:4px;transition:border-color .15s,color .15s;
}
.home:hover{border-color:var(--acc);color:var(--acc)}
:focus-visible{outline:2px solid var(--acc);outline-offset:3px}
</style>
</head>
<body>
  <p class="eyebrow">Ultimatum</p>
  <div class="code">404</div>
  <h1>This page went freelance.</h1>
  <p>The page you’re after doesn’t exist or moved. Let’s get you back.</p>
  <a class="home" href="/">← Back home</a>
</body>
</html>
