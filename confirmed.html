<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light">
<link rel="icon" type="image/jpeg" href="/images/cover-better-eng.jpg">
<title>You're in — Ultimatum</title>
<meta name="description" content="Your subscription to the Ultimatum book waitlist is confirmed.">
<meta name="robots" content="noindex,follow">
<style>
@font-face{font-family:'Albertus Nova';src:url('/fonts/albertus-nova-black.woff2')format('woff2');font-weight:900;font-style:normal;font-display:swap}
@font-face{font-family:'Jost';src:url('/fonts/jost-variable.woff2')format('woff2');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'Ubuntu Mono';src:url('/fonts/ubuntu-mono-regular.woff2')format('woff2');font-weight:400;font-style:normal;font-display:swap}
:root{
  --font-display:'Albertus Nova',Georgia,serif;
  --font-text:'Jost',system-ui,sans-serif;
  --font-mono:'Ubuntu Mono','Courier New',monospace;
  --l-bg:#ECEFF2;--l-text:#14151C;--l-muted:rgba(20,21,28,.55);--l-border:rgba(20,21,28,.1);
  --acc:#FF2A38;
  --px:clamp(1.25rem,5vw,4rem);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--l-bg);color:var(--l-text);font-family:var(--font-text);line-height:1.6;
  min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:var(--px);gap:.25rem}
.eyebrow{font-family:var(--font-mono);font-size:.625rem;letter-spacing:.3em;text-transform:uppercase;color:var(--acc);margin-bottom:1.25rem}
h1{font-family:var(--font-display);font-weight:900;font-size:clamp(2.25rem,7vw,4rem);line-height:1;letter-spacing:-.01em}
p{color:var(--l-muted);max-width:42ch;margin:1.25rem 0 2rem}
.home{display:inline-block;font-family:var(--font-mono);font-size:.75rem;letter-spacing:.18em;text-transform:uppercase;
  text-decoration:none;color:var(--l-text);border:1px solid var(--l-border);padding:.7rem 1.4rem;border-radius:4px;transition:border-color .15s,color .15s}
.home:hover{border-color:var(--acc);color:var(--acc)}
:focus-visible{outline:2px solid var(--acc);outline-offset:3px}
</style>
</head>
<body>
  <p class="eyebrow">Ultimatum</p>
  <h1>You're in. Talk soon.</h1>
  <p>Your email is confirmed — you'll be the first to hear when the book is ready.</p>
  <a class="home" href="/">← Back home</a>
</body>
</html>
